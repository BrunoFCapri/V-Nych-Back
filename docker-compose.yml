version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: vnych_db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: v_nych
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    volumes:
      - ./postgres-data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: vnych_redis
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - ./redis-data:/data

  backend:
    container_name: vnych_backend
    build: 
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgres://postgres:password@db:5432/v_nych
      REDIS_URL: redis://redis:6379/
      RUST_LOG: debug
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
